<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>㊙️我們的秘密基地 V9.1</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;}
header{background:#ffb6c1;padding:10px;text-align:center;font-weight:bold;}
.container{display:flex;}
.left{width:25%;background:white;height:100vh;padding:10px;overflow:auto;}
.right{width:75%;padding:10px;}
.card{background:white;margin:10px 0;padding:10px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
button{margin:5px;}
input,select,textarea{margin:5px;width:95%;}
.del{background:red;color:white;border:none;padding:5px 8px;border-radius:5px;}
.yearBox,.monthBox{display:flex;flex-wrap:wrap;}
.backBtn{
background:#666;color:white;border:none;
padding:6px 10px;border-radius:6px;
margin-bottom:10px;
}
</style>

</head>

<body>

<header id="days"></header>

<div class="container">

<!-- 左側 -->
<div class="left">

<h3>👤個人檔案</h3>

<input id="name" placeholder="名字">
<select id="gender">
<option value="boy">👨 男</option>
<option value="girl">👩 女</option>
</select>

<input id="birth" type="date">
<textarea id="bio" placeholder="個人介紹"></textarea>

<button onclick="saveProfile()">儲存</button>

<div id="profile"></div>

</div>

<!-- 右側 -->
<div class="right">

<button onclick="show('food')">🍜美食</button>
<button onclick="show('movie')">🎬片單</button>
<button onclick="show('money')">💰記帳</button>
<button onclick="show('note')">📝記事本</button>
<button onclick="show('todo')">📋待辦清單</button>

<div id="content"></div>

</div>

</div>

<script>

//////////////////////
// 💖 在一起天數
//////////////////////
let start = new Date("2025-10-06");
document.getElementById("days").innerText =
`💖 在一起第 ${Math.floor((new Date()-start)/86400000)} 天`;

//////////////////////
// 👤 個人檔案（修正完成）
//////////////////////
function saveProfile(){

let nameVal = document.getElementById("name").value;
let genderVal = document.getElementById("gender").value;
let birthVal = document.getElementById("birth").value;
let bioVal = document.getElementById("bio").value;

localStorage.setItem("profile",JSON.stringify({
name:nameVal,
gender:genderVal,
birth:birthVal,
bio:bioVal
}));

loadProfile();
}

function loadProfile(){
let p=JSON.parse(localStorage.getItem("profile"));
if(!p)return;

let age=new Date().getFullYear()-new Date(p.birth).getFullYear();
let icon=p.gender==="boy"?"💙":"💗";

profile.innerHTML=
`<div class="card">
<div>
<h3>${icon} ${p.name}</h3>
<div>🎂 ${p.birth}（${age}歲）</div>
<div>${p.bio||""}</div>
</div>
</div>`;
}

loadProfile();

//////////////////////
// 切換
//////////////////////
function show(t){
if(t==="food") foodPage();
if(t==="movie") moviePage();
if(t==="money") moneyPage();
if(t==="note") notePage();
if(t==="todo") todoPage();
}

//////////////////////
// 🍜 美食（修正地圖可點）
//////////////////////
let foods=JSON.parse(localStorage.getItem("foods")||"[]");

function foodPage(){
content.innerHTML=`
<h3>🍜美食</h3>

<select id="cat">
<option>🍝義大利麵</option>
<option>🍲火鍋</option>
<option>🍜拉麵</option>
<option>🥩牛排</option>
<option>🍢小吃</option>
<option>🍰甜點</option>
<option>🍱其他</option>
</select>

<input id="f" placeholder="餐廳名稱">
<input id="m" placeholder="Google Map連結">

<button onclick="addFood()">新增</button>
<div id="foodList"></div>
`;

renderFood();
}

function addFood(){
foods.push({cat:cat.value,name:f.value,map:m.value});
localStorage.setItem("foods",JSON.stringify(foods));
renderFood();
}

//////////////////////
// 🔧 修正：地圖可點
//////////////////////
function renderFood(){

foodList.innerHTML = foods.map((f,i)=>
`<div class="card">
<div>
${f.cat}｜${f.name}<br>
<a href="${f.map}" target="_blank">📍 查看地圖</a>
</div>

<button class="del" onclick="delFood(${i})">刪除</button>
</div>`
).join("");

}

function delFood(i){
foods.splice(i,1);
localStorage.setItem("foods",JSON.stringify(foods));
renderFood();
}

//////////////////////
// 🎬 片單
//////////////////////
let movies=JSON.parse(localStorage.getItem("movies")||"[]");

function moviePage(){
content.innerHTML=`
<h3>🎬片單</h3>

<select id="type">
<option>電影</option>
<option>影集</option>
<option>動畫</option>
</select>

<input id="title" placeholder="名稱">

<select id="rate">
<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>
</select>

<button onclick="addMovie()">新增</button>
<div id="movieList"></div>
`;

renderMovie();
}

function addMovie(){
movies.push({type:type.value,title:title.value,rate:rate.value});
localStorage.setItem("movies",JSON.stringify(movies));
renderMovie();
}

function renderMovie(){
movieList.innerHTML=movies.map((m,i)=>
`<div class="card">
<div>${m.type}｜${m.title}｜${m.rate}</div>
<button class="del" onclick="delMovie(${i})">刪除</button>
</div>`
).join("");
}

function delMovie(i){
movies.splice(i,1);
localStorage.setItem("movies",JSON.stringify(movies));
renderMovie();
}

//////////////////////
// 💰 記帳（含月花費對比）
//////////////////////
let money=JSON.parse(localStorage.getItem("money")||"[]");

function moneyPage(){
content.innerHTML=`
<h3>💰記帳</h3>

<select id="catm">
<option>🍔餐飲</option>
<option>👕衣服</option>
<option>🏠住房</option>
<option>🚗交通</option>
<option>🎮娛樂</option>
<option>📦其他</option>
</select>

<input id="item" placeholder="📝輸入項目">
<input id="price" type="number" placeholder="💰輸入金額">
<input id="time" type="time">

<select id="who">
<option value="🐶">🐶</option>
<option value="🐷">🐷</option>
<option value="split">⚖️平分</option>
</select>

<button onclick="addMoney()">新增</button>
<button onclick="showReport()">📊財務報表</button>

<div id="moneyList"></div>
`;

renderMoney();
}

function addMoney(){
money.push({
cat:catm.value,
item:item.value,
price:Number(price.value),
time:time.value,
who:who.value,
year:new Date().getFullYear(),
month:new Date().getMonth()+1,
day:new Date().getDate()
});
localStorage.setItem("money",JSON.stringify(money));
renderMoney();
}

function renderMoney(){
moneyList.innerHTML=money.map((m,i)=>
`<div class="card">
<div>${m.year}/${m.month}/${m.day} ${m.time}<br>
${m.cat}｜${m.item}｜${m.price}｜${m.who}</div>
<button class="del" onclick="delMoney(${i})">刪除</button>
</div>`
).join("");
}

function delMoney(i){
money.splice(i,1);
localStorage.setItem("money",JSON.stringify(money));
renderMoney();
}

//////////////////////
// 📊 財務報表（含月對比）
//////////////////////
function showReport(){
let html=`<button onclick="moneyPage()" class="backBtn">🔙返回</button>
<h3>📊選擇年份</h3><div class="yearBox">`;

for(let y=2026;y<=2036;y++){
html+=`<button onclick="showMonth(${y})">${y}</button>`;
}

html+="</div>";
content.innerHTML=html;
}

function showMonth(year){
let html=`<button onclick="showReport()" class="backBtn">🔙返回</button>
<h3>${year}年</h3><div class="monthBox">`;

for(let m=1;m<=12;m++){
html+=`<button onclick="showMonthDetail(${year},${m})">${m}月</button>`;
}

html+="</div>";
content.innerHTML=html;
}

function showMonthDetail(year,month){

let list = money.filter(m=>m.year==year && m.month==month);

let total = list.reduce((a,b)=>a+b.price,0);

let dog = list.filter(m=>m.who==="🐶").reduce((a,b)=>a+b.price,0);
let pig = list.filter(m=>m.who==="🐷").reduce((a,b)=>a+b.price,0);
let split = list.filter(m=>m.who==="split").reduce((a,b)=>a+b.price,0);

let compareText =
dog>pig ? `🐶 本月花比較多（+${dog-pig}）` :
pig>dog ? `🐷 本月花比較多（+${pig-dog}）` :
`⚖️ 兩人花費一樣`;

content.innerHTML=`
<button onclick="showMonth(${year})" class="backBtn">🔙返回</button>

<h3>${year}/${month}</h3>

<div class="card">💰總支出：${total}</div>

<div class="card">🐶 花費：${dog}</div>
<div class="card">🐷 花費：${pig}</div>
<div class="card">⚖️ 平分：${split}</div>

<div class="card" style="background:#fff3cd">
📊 ${compareText}
</div>

<hr>

<h4>📋明細</h4>
`+
list.map(m=>
`<div class="card">
${m.day} ${m.time}｜${m.cat}｜${m.item}｜${m.price}｜${m.who}
</div>`
).join("");
}

//////////////////////
// 📝 記事本
//////////////////////
let notes=JSON.parse(localStorage.getItem("notes")||"[]");

function notePage(){
content.innerHTML=`
<h3>📝記事本</h3>

<textarea id="n"></textarea>
<button onclick="addNote()">發佈</button>

<div id="noteList"></div>
`;
renderNote();
}

function addNote(){
notes.unshift(n.value);
localStorage.setItem("notes",JSON.stringify(notes));
renderNote();
}

function renderNote(){
noteList.innerHTML=notes.map((n,i)=>
`<div class="card">
<div>${n}</div>
<button class="del" onclick="delNote(${i})">刪除</button>
</div>`
).join("");
}

function delNote(i){
notes.splice(i,1);
localStorage.setItem("notes",JSON.stringify(notes));
renderNote();
}

//////////////////////
// 📋 待辦清單
//////////////////////
let todos=JSON.parse(localStorage.getItem("todos")||"[]");

function todoPage(){
content.innerHTML=`
<h3>📋待辦清單</h3>

<input id="todoText" placeholder="📝任務">
<input id="todoDate" type="date" placeholder="📅日期">

<button onclick="addTodo()">新增</button>

<div id="todoList"></div>
`;
renderTodo();
}

function addTodo(){
todos.push({
text:todoText.value,
date:todoDate.value
});
localStorage.setItem("todos",JSON.stringify(todos));
renderTodo();
}

function renderTodo(){
todoList.innerHTML=todos.map((t,i)=>
`<div class="card">
<div>📌 ${t.text}<br>📅 ${t.date}</div>
<input type="checkbox" onchange="doneTodo(${i})">
</div>`
).join("");
}

function doneTodo(i){
todos.splice(i,1);
localStorage.setItem("todos",JSON.stringify(todos));
renderTodo();
}

</script>

</body>
</html>
